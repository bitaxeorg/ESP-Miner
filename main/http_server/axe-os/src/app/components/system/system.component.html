<div class="card" *ngIf="systemRows$ | async as rows">
    <h2>System</h2>

    <div class="card">
        <table>
            <tr *ngFor="let row of rows; trackBy: trackByRowLabel">
                <td class="text-secondary align-top whitespace-nowrap pr-6 py-0.5" [class.pb-4]="row.isSeparator">{{ row.label }}</td>
                <td class="align-top break-all py-0.5" [ngClass]="row.valueClass || ''" [class.pb-4]="row.isSeparator" [attr.sensitive-data]="row.isSensitiveData ? '' : null" [pTooltip]="row.tooltip">{{ row.value }}</td>
            </tr>
        </table>

        <button pButton class="btn btn-primary mt-5" (click)="identifyDevice()">
            Identify device
        </button>
    </div>
</div>
